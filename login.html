<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - NUBO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-card-inner">
          <h2>Bienvenido</h2>
          <p class="auth-subtitle">Accede a tu cuenta para comprar refacciones</p>

          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
            <button class="auth-tab" data-tab="register">Crear cuenta</button>
          </div>

          <div class="auth-panel active" id="panel-login">
            <div class="form-error" id="login-error"></div>
            <form id="login-form">
              <div class="form-group">
                <label for="login-email">Correo electrónico</label>
                <input type="email" id="login-email" placeholder="correo@ejemplo.com" autocomplete="username">
              </div>
              <div class="form-group">
                <label for="login-pass">Contraseña</label>
                <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary btn-block btn-lg">Ingresar</button>
            </form>
            <div class="demo-hint">
              <strong>Usuarios demo:</strong><br>
              <strong>demo@nubo.com</strong> / <strong>demo123</strong><br>
              <strong>cliente@nubo.com</strong> / <strong>cliente123</strong>
            </div>
          </div>

          <div class="auth-panel" id="panel-register">
            <div class="form-error" id="register-error"></div>
            <form id="register-form">
              <p class="form-section-desc">Datos de registro de usuario</p>
              <div class="form-group">
                <label for="reg-name">Nombre completo</label>
                <input type="text" id="reg-name" placeholder="Ej. María García López" autocomplete="name">
              </div>
              <div class="form-group">
                <label for="reg-email">Correo electrónico <span class="label-hint">(identificador único)</span></label>
                <input type="email" id="reg-email" placeholder="correo@ejemplo.com" autocomplete="email">
              </div>
              <div class="form-group">
                <label for="reg-pass">Contraseña</label>
                <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
              </div>
              <div class="form-group">
                <label for="reg-confirm">Confirmar contraseña</label>
                <input type="password" id="reg-confirm" placeholder="Repite tu contraseña" autocomplete="new-password">
              </div>
              <p class="form-note">La contraseña se guarda con hash en este navegador (demo local).</p>
              <button type="submit" class="btn btn-primary btn-block btn-lg">Crear cuenta</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('header-placeholder').innerHTML = renderHeader();
    initHeader();
    updateCartBadge();
  </script>
</body>
</html>
